<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script>
    // Apply dark mode BEFORE render to prevent flash of light theme
    if (localStorage.getItem('tabout-dark-mode') === 'true') {
      document.documentElement.classList.add('dark-mode');
    }
  </script>
</head>
<body>
<div class="container">

  <!-- ================================================================
       HEADER — greeting on the left, controls on the right
       ================================================================ -->
  <header>
    <div class="header-left">
      <h1 id="greeting"></h1>
      <div class="date" id="dateDisplay"></div>
      <div class="weather" id="weather"></div>
    </div>
    <div class="header-right">
      <!-- Pomodoro Timer -->
      <div class="pomodoro" id="pomodoro">
        <span class="pomodoro-time" id="pomodoroTime">25:00</span>
        <span class="pomodoro-label" id="pomodoroLabel">work</span>
        <button class="pomodoro-btn" id="pomodoroPlayPause" title="Start/Pause">▶</button>
        <button class="pomodoro-btn" id="pomodoroReset" title="Reset">↻</button>
      </div>
      <!-- Live clock -->
      <div class="clock" id="clock"></div>
      <!-- Dark mode toggle -->
      <button class="icon-btn" id="darkModeToggle" title="Toggle dark mode">
        <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
      </button>
      <!-- Settings gear -->
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- ================================================================
       QUICK LINKS — row of favicon shortcuts
       ================================================================ -->
  <div class="quick-links" id="quickLinks"></div>

  <!-- ================================================================
       SEARCH BAR
       ================================================================ -->
  <form class="search-bar" id="searchForm" target="_blank">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16">
      <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
    </svg>
    <input type="text" id="searchInput" name="q" placeholder="Search Google..." autocomplete="off">
  </form>

  <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        You have <strong id="tabOutDupeCount"></strong> Tab Out tabs open. Keep just this one?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
  </div>

  <!-- ================================================================
       OPEN TABS — domain/mission cards
       ================================================================ -->
    <div class="active-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2 id="openTabsSectionTitle">Right now</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="missions" id="openTabsMissions"></div>
    </div>

  <!-- ================================================================
       SAVED FOR LATER — checklist below tabs
       ================================================================ -->
    <div class="deferred-section" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2>Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>

      <div class="deferred-list" id="deferredList"></div>

      <div class="deferred-empty" id="deferredEmpty" style="display:none">
        Nothing saved. Living in the moment.
      </div>

      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          Archive
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>

  <!-- ================================================================
       RECENTLY CLOSED TABS
       ================================================================ -->
  <div class="recently-closed-section" id="recentlyClosedSection" style="display:none">
    <div class="section-header">
      <button class="recently-closed-toggle" id="recentlyClosedToggle">
        <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
        Recently closed
        <span class="archive-count" id="recentlyClosedCount"></span>
      </button>
      <div class="section-line"></div>
      <button class="action-btn" id="clearRecentlyClosed" style="font-size:10px;padding:3px 8px;">Clear</button>
    </div>
    <div class="recently-closed-list" id="recentlyClosedList" style="display:none"></div>
  </div>

  <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
      </div>
    </div>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/zarazhangrui/tab-out" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab Out</a> by <a href="https://x.com/zarazhangrui" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Zara</a></span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     SETTINGS MODAL
     ================================================================ -->
<div class="settings-overlay" id="settingsOverlay" style="display:none">
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="icon-btn" id="settingsClose" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
      </button>
    </div>
    <div class="settings-body">
      <!-- Name -->
      <div class="settings-group">
        <label class="settings-label">Your name</label>
        <input type="text" id="settingUserName" class="settings-input" placeholder="(optional)">
      </div>
      <!-- Clock -->
      <div class="settings-group">
        <label class="settings-label">Clock format</label>
        <div class="settings-row">
          <select id="settingClockFormat" class="settings-select">
            <option value="12">12-hour</option>
            <option value="24">24-hour</option>
          </select>
          <label class="settings-checkbox-label">
            <input type="checkbox" id="settingClockSeconds"> Show seconds
          </label>
        </div>
      </div>
      <!-- Pomodoro -->
      <div class="settings-group">
        <label class="settings-label">Pomodoro</label>
        <div class="settings-row">
          <label>Work <input type="number" id="settingPomodoroWork" class="settings-input-sm" min="1" max="120"> min</label>
          <label>Break <input type="number" id="settingPomodoroBreak" class="settings-input-sm" min="1" max="60"> min</label>
        </div>
      </div>
      <!-- Search engine -->
      <div class="settings-group">
        <label class="settings-label">Search engine</label>
        <select id="settingSearchEngine" class="settings-select">
          <option value="google">Google</option>
          <option value="bing">Bing</option>
          <option value="duckduckgo">DuckDuckGo</option>
          <option value="brave">Brave</option>
          <option value="ecosia">Ecosia</option>
        </select>
      </div>
      <!-- Quick links -->
      <div class="settings-group">
        <label class="settings-label">Quick links</label>
        <div class="settings-quick-links" id="settingsQuickLinks"></div>
        <div class="settings-row" style="margin-top:8px">
          <input type="text" id="settingNewLinkTitle" class="settings-input" placeholder="Title" style="flex:1">
          <input type="text" id="settingNewLinkUrl" class="settings-input" placeholder="https://..." style="flex:2">
          <button class="action-btn" id="settingAddLink">Add</button>
        </div>
      </div>
    </div>
    <div class="settings-footer">
      <button class="action-btn primary" id="settingsSave">Save settings</button>
    </div>
  </div>
</div>

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js" onerror="/* no personal config, that's fine */"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
